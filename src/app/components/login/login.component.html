<div class="login-container">
  <!-- Imagen - Lado izquierdo -->
  <div class="image-section">
    <img src="assets/images/login.png" alt="Alimentación saludable" class="login-image">
  </div>

  <!-- Formulario login - Lado derecho -->
  <div class="form-section">
    <!-- Botón de regreso -->
    <button mat-icon-button class="back-btn" type="button" (click)="goBack()">
      <mat-icon>arrow_back</mat-icon>
    </button>

    <div class="form-wrapper">
      <!-- Logo -->
      <div class="logo-section">
        <img src="assets/images/MIKHUY.png" alt="MIKHUY Logo" class="logo-img">
      </div>

      <!-- Formulario -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form" autocomplete="off">

        <!-- Campo de Usuario/Email -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Correo electrónico</mat-label>
          <input
            matInput
            type="email"
            placeholder="Ingresa tu correo"
            formControlName="username"
            autocomplete="email"
          >
          <mat-error *ngIf="loginForm.get('username')?.hasError('required')">
            El correo es requerido
          </mat-error>
          <mat-error *ngIf="loginForm.get('username')?.hasError('email')">
            Ingresa un correo válido
          </mat-error>
        </mat-form-field>

        <!-- Campo de contraseña -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input
            matInput
            [type]="hidePassword ? 'password' : 'text'"
            placeholder="Contraseña"
            formControlName="password"
            autocomplete="current-password"
          >
          <button
            mat-icon-button
            matSuffix
            type="button"
            (click)="togglePasswordVisibility()"
            aria-label="Mostrar u ocultar contraseña"
          >
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
            La contraseña es requerida
          </mat-error>
          <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">
            Mínimo 6 caracteres
          </mat-error>
        </mat-form-field>

        <!-- ¿No recuerdas tu contraseña? -->
        <div class="help-row">
          <mat-icon class="help-icon">help_outline</mat-icon>
          <span>
            ¿No recuerdas tu contraseña o usuario? Contáctanos:
            <a href="mailto:helpdesk@mikhuy.com" class="help-mail">
              helpdesk&#64;mikhuy.com
            </a>
          </span>
        </div>

        <!-- Estado del servidor -->
        <div *ngIf="backendWaking && !backendReady" class="backend-status waking">
          <mat-icon class="spin">sync</mat-icon>
          <span>Iniciando servidor, por favor espera...</span>
        </div>

        <div *ngIf="backendReady" class="backend-status ready">
          <mat-icon>check_circle</mat-icon>
          <span>Servidor listo</span>
        </div>

        <!-- Botón de ingreso -->
        <button
          mat-raised-button
          color="primary"
          type="submit"
          class="submit-btn"
          [disabled]="loginForm.invalid || loading"
        >
          <span *ngIf="!loading">Ingresar</span>
          <span *ngIf="loading" class="btn-loading">
            <mat-icon class="spin-btn">sync</mat-icon>
            Ingresando...
          </span>
        </button>

      </form>
    </div>
  </div>
</div>
